name: Build & Release Local Cortex

on:
  push:
    tags:
      - 'v*'          # triggers on: git tag v1.0.1 && git push --tags
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build-windows:
    name: Build Windows Installers
    runs-on: windows-latest
    permissions:
      contents: write   # required to create GitHub Releases and upload assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (all Windows targets)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # SignPath signing (uncomment once SignPath Foundation approves you)
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Local Cortex ${{ github.ref_name }}'
          releaseBody: |
            ## Local Cortex ${{ github.ref_name }}

            A fully offline AI workspace for Windows — local LLM chat + built-in code editor.

            ### What you need
            - Windows 10 / 11
            - [Ollama for Windows](https://ollama.com/download/windows)

            ### Downloads
            | File | Description |
            |------|-------------|
            | `Local_Cortex_x64_en-US.msi` | Windows Installer (recommended) |
            | `Local_Cortex_x64-setup.exe` | NSIS Executable Installer |

            > Code signing for Local Cortex is provided by the [SignPath Foundation](https://signpath.org).

            ### First launch
            The built-in Setup Wizard will automatically pull the required AI models from Ollama.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: --target x86_64-pc-windows-msvc
